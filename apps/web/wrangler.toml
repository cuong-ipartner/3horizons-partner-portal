# Cloudflare Pages (SPA + Functions)
# Project name must match the Pages project in the dashboard.
#
# Dashboard Builds (Git):
#   Root directory:  apps/web
#   Build command:   npm run build
#   Deploy command:  (leave EMPTY — do NOT use `wrangler deploy`)
#   Build output:    dist
#
# CLI deploy (from apps/web):
#   npm run build
#   npm run cf:pages
#   # = npx wrangler pages deploy dist --project-name=3horizons-partner-portal
#
# Never use `npx wrangler deploy` for this project (Workers API → Missing entry-point).

name = "3horizons-partner-portal"
compatibility_date = "2025-01-01"
pages_build_output_dir = "dist"
