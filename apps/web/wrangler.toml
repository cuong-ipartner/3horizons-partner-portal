# Cloudflare Pages (SPA + Functions)
# Project name must match the Pages project in the dashboard.
#
# Dashboard Builds (Git-connected Pages):
#   Root directory:  apps/web
#   Build command:   npm run build
#   Deploy command:  LEAVE EMPTY
#     Do NOT set: npx wrangler pages deploy …
#     Do NOT set: npx wrangler deploy
#     Pages already publishes dist after a successful build.
#   Build output:    dist
#
# Local CLI only (your machine, wrangler login):
#   npm run build && npm run cf:pages

name = "3horizons-partner-portal"
