# Cloudflare Pages (SPA + Functions)
# Project name must match the Pages project in the dashboard.
#
# Build (CF dashboard / local):
#   Root directory: apps/web
#   Build command:  npm run build
#   Output dir:     dist
#
# Deploy CLI (from apps/web — keeps functions/ next to dist):
#   npm run build
#   npx wrangler pages deploy dist --project-name=3horizons-partner-portal

name = "3horizons-partner-portal"
compatibility_date = "2025-01-01"
pages_build_output_dir = "dist"
